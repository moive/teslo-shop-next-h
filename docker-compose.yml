services:
  postgres-db:
    image: postgres:18
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    container_name: tesloNextDB
    volumes:
      - ./postgres:/var/lib/postgresql/18/data
    ports:
      - 5436:5432
